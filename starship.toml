# configs
[username]
show_always = true
style_user = "bg:mauve fg:crust"
style_root = "bg:mauve fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:blue fg:crust"
format = "[ $path ]($style)"
truncation_length = 0
truncate_to_repo = false
truncation_symbol = "ÔÇĞ/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[git_branch]
symbol = "´Éİ"
style = "bg:sky"
format = '[[ $symbol $branch ](fg:crust bg:sky)]($style)'

[git_status]
style = "bg:sky"
format = '[[($all_status$ahead_behind )](fg:crust bg:sky)]($style)'

[fill]
symbol = '-'
style = 'bold sky'

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:green)'
error_symbol = '[ÔØ»](bold fg:red)'
vimcmd_symbol = '[ÔØ«](bold fg:green)'
vimcmd_replace_one_symbol = '[ÔØ«](bold fg:lavender)'
vimcmd_replace_symbol = '[ÔØ«](bold fg:lavender)'
vimcmd_visual_symbol = '[ÔØ«](bold fg:yellow)'

[time]
disabled = false
format = "[$time]($style)"
time_format = "%H:%M:%S" # 24-hour format (e.g., 14:30:45)
style = "bg:sky fg:crust"

[cmd_duration]
min_time = 2000
style = "fg:sky"
format = " [$duration]($style) "

# languages
[rust]
symbol = "¯Ş¿"
